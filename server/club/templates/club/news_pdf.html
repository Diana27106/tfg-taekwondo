<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ news.title }}</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }
        body {
            font-family: Arial, sans-serif;
            color: #333;
            line-height: 1.6;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #1a1a1a;
            margin: 0;
            font-size: 28px;
        }
        .date {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
        .content {
            font-size: 16px;
            text-align: justify;
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .news-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            margin-bottom: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ news.title }}</h1>
        <div class="date">Publicado el: {{ news.published_at|date:"d/m/Y" }}</div>
    </div>

    {% if news.img1 %}
        <div style="text-align: center;">
            <img src="{{ image_url }}" class="news-image">
        </div>
    {% endif %}

    <div class="content">
        {{ news.content|linebreaks }}
    </div>

    <div class="footer">
        Club Taekwondo - Documento generado automáticamente
    </div>
</body>
</html>
