services:
  # ── Base de datos vectorial (Qdrant) ──────────────────────────────────
  qdrant:
    image: qdrant/qdrant
    container_name: ${QDRANT_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      # La ':Z' es la clave en Fedora/SELinux
      - qdrant_data:/qdrant/storage:Z 
    networks:
      - tfg-network

  # ── Base de datos Relacional (PostgreSQL) ───────────────────────────
  postgres:
    image: postgres:15
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
      - postgres_data:/var/lib/postgresql/data:Z
    networks:
      - tfg-network

  # ── LLM Local (Ollama) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: ${OLLAMA_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama_data:/root/.ollama:Z
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && ollama pull ${OLLAMA_MODEL} && ollama pull ${OLLAMA_EMBEDDING_MODEL} && wait"
    networks:
      - tfg-network

  # ── Automatización Chatbot (n8n) ────────────────────────────────────
  n8n:
    image: n8nio/n8n
    container_name: ${N8N_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${N8N_PORT}:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=host.docker.internal
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_SECURE_COOKIE=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
      - ollama
      - postgres
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - tfg-network

volumes:
  qdrant_data:
  ollama_data:
  n8n_data:
  postgres_data:

networks:
  tfg-network:
    driver: bridge